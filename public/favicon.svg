<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <!-- Cardboard-arcade D tile, matching the Doremino wordmark.
       Tomato-red face, dark cardboard edge, offset hard shadow.       -->
  <!-- Offset shadow (no blur) -->
  <rect x="11" y="13" width="44" height="44" rx="9" fill="#2a2826"/>
  <!-- Tile body -->
  <rect x="6" y="8"  width="44" height="44" rx="9"
        fill="#ff5b4a" stroke="#2a2826" stroke-width="3"/>
  <!-- "D" letter, inset slightly to feel like a chip -->
  <text x="28" y="42"
        text-anchor="middle"
        font-family="Bricolage Grotesque, ui-sans-serif, system-ui, sans-serif"
        font-weight="800"
        font-size="32"
        letter-spacing="-1"
        fill="#fff8eb"
        style="paint-order: stroke; stroke: rgba(0,0,0,0.25); stroke-width: 2;">
    D
  </text>
</svg>
